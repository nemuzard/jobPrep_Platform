spring:
  application:
    name: jobprep_platform
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      database: 0
      timeout: 2000
      jedis:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 2000
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": true
      "[mail.smtp.connectiontimeout]": 5000
      "[mail.smtp.timeout]": 3000
      "[mail.smtp.writetimeout]": 5000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.jobprep.jobprep_platform.entity.custom
  type-handlers-package: com.jobprep.jobprep_platform.typehandler

jwt:
  # HS512 requires a sufficiently long secret. Override via env var in real deployments.
  secret: ${JWT_SECRET:dev-only-secret-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  expiration: 2592000

server:
  port: 8080

mail:
  verify-code:
    expire-minutes: 15
    limit-expire-seconds: 60
    template-path: "templates/mail/verify-code.html"

logging:
  level:
    org.apache.ibatis: DEBUG
