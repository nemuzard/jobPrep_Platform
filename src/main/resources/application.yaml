spring:
  application:
    name: jobprep_platform
  servlet:
    multipart:
      max-file-size: 50MB
      max-request-size: 50MB
  profiles:
    active: dev
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6380}
      database: 0
      timeout: 2000
      jedis:
        pool:
          enabled: true
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 2000
  rabbitmq:
    host: ${RABBITMQ_HOST:localhost}
    port: ${RABBITMQ_PORT:5672}
    username: ${RABBITMQ_USERNAME:jobprep}
    password: ${RABBITMQ_PASSWORD:jobprep123}
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 2000
          max-attempts: 3
          multiplier: 2
        default-requeue-rejected: false
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      "[mail.smtp.auth]": true
      "[mail.smtp.starttls.enable]": true
      "[mail.smtp.connectiontimeout]": 5000
      "[mail.smtp.timeout]": 3000
      "[mail.smtp.writetimeout]": 5000

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  type-aliases-package: com.jobprep.jobprep_platform.entity.custom
  type-handlers-package: com.jobprep.jobprep_platform.typehandler

jwt:
  # HS512 requires a sufficiently long secret. Override via env var in real deployments.
  secret: ${JWT_SECRET:dev-only-secret-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
  expiration: 2592000

server:
  port: 8080

mail:
  verify-code:
    expire-minutes: 15
    limit-expire-seconds: 60
    template-path: "templates/mail/verify-code.html"

app:
  resume-match:
    worker:
      enabled: ${RESUME_MATCH_WORKER_ENABLED:true}
    queue:
      exchange: resume.match.exchange
      routing-key: resume.match.parse-score
      queue-name: resume.match.parse-score.queue
    storage:
      provider: local
      local-root: ${RESUME_OBJECT_ROOT:${user.dir}/tmp/resume-objects}
      upload-url-ttl-seconds: 900
    rate-limit:
      capacity: 5
      refill-tokens: 5
      refill-seconds: 60
    cache:
      result-ttl-minutes: 720
  ai:
    provider: ${AI_PROVIDER:ollama}
    ollama:
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
      model: ${OLLAMA_MODEL:llama3.1:8b}
      embedding-model: ${OLLAMA_EMBEDDING_MODEL:nomic-embed-text}
      timeout-seconds: 120
  rag:
    pgvector:
      url: ${RAG_VECTOR_JDBC_URL:jdbc:postgresql://localhost:5433/jobprep_rag}
      username: ${RAG_VECTOR_USERNAME:jobprep}
      password: ${RAG_VECTOR_PASSWORD:jobprep123}
      table-name: learning_resource_embedding
      embedding-dimension: 768
    retrieval:
      top-k: 6
      cache-ttl-minutes: 720

logging:
  level:
    org.apache.ibatis: DEBUG
